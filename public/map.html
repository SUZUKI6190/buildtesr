<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>地図Webアプリ - 地図</title>
	<link
		rel="stylesheet"
		href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
		crossorigin="">
	<style>
		html,
		body {
			height: 100%;
			margin: 0;
		}

		body {
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		#map {
			height: 100%;
			width: 100%;
		}

		.status {
			background: rgba(15, 23, 42, 0.86);
			border-radius: 0.75rem;
			color: white;
			left: 50%;
			max-width: min(90vw, 34rem);
			padding: 0.75rem 1rem;
			position: fixed;
			text-align: center;
			top: 1rem;
			transform: translateX(-50%);
			z-index: 1000;
		}

		.back-link {
			background: white;
			border-radius: 999px;
			box-shadow: 0 8px 20px rgba(15, 23, 42, 0.18);
			color: #1d4ed8;
			font-weight: 700;
			left: 1rem;
			padding: 0.6rem 1rem;
			position: fixed;
			text-decoration: none;
			top: 1rem;
			z-index: 1001;
		}
	</style>
</head>
<body>
	<a class="back-link" href="/">戻る</a>
	<div id="status" class="status">現在地を取得しています...</div>
	<div id="map" aria-label="現在地の地図"></div>

	<script
		src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"
		crossorigin=""></script>
	<script>
		const status = document.getElementById("status");
		const defaultCenter = [139.767125, 35.681236];

		const map = new maplibregl.Map({
			container: "map",
			style: "https://demotiles.maplibre.org/style.json",
			center: defaultCenter,
			zoom: 13,
			antialias: true
		});

		map.addControl(new maplibregl.NavigationControl(), "top-right");

		let locationMarker = null;
		let locationPopup = null;

		function showCurrentLocation(position) {
			const latitude = position.coords.latitude;
			const longitude = position.coords.longitude;
			const currentLocation = [longitude, latitude];

			if (locationMarker) {
				locationMarker.remove();
			}
			if (locationPopup) {
				locationPopup.remove();
			}

			map.flyTo({
				center: currentLocation,
				zoom: 16,
				essential: true
			});

			locationPopup = new maplibregl.Popup({
				closeButton: false,
				closeOnClick: false,
				offset: 24
			})
				.setLngLat(currentLocation)
				.setText("ここにいる")
				.addTo(map);

			locationMarker = new maplibregl.Marker({ color: "#2563eb" })
				.setLngLat(currentLocation)
				.addTo(map);

			status.hidden = true;
		}

		function showLocationError(error) {
			const messages = {
				1: "位置情報の利用が許可されませんでした。ブラウザの設定を確認してください。",
				2: "現在地を取得できませんでした。通信環境を確認してください。",
				3: "現在地の取得がタイムアウトしました。"
			};

			status.textContent = messages[error.code] || "現在地を取得できませんでした。";
		}

		if ("geolocation" in navigator) {
			navigator.geolocation.getCurrentPosition(showCurrentLocation, showLocationError, {
				enableHighAccuracy: true,
				maximumAge: 0,
				timeout: 10000
			});
		} else {
			status.textContent = "このブラウザは位置情報取得に対応していません。";
		}
	</script>
</body>
</html>
